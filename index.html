<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lilie Blooms</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<!-- ======================
MÚSICA
====================== -->
<audio id="bgMusic" loop>
    <source src="music/ambiente.mp3" type="audio/mp3">
</audio>

<button id="musicBtn" class="music-btn">🎵 Música</button>

<!-- ======================
HEADER
====================== -->
<header class="header">

<div class="logo">
    <img src="IMG_3096.jpeg">
    <h1>Lilie Blooms</h1>
</div>

<nav>
    <a href="#inicio">Inicio</a>
    <a href="#productos">Productos</a>
    <a href="#personalizar">Personalizar</a>
</nav>

<div class="header-icons">

<button id="carrito">
🛒 <span>0</span>
</button>

</div>

</header>

<!-- ======================
HERO
====================== -->
<section id="inicio" class="hero">
<h1>Flores de limpiapipas</h1>
<p>Hechas a mano con amor</p>
</section>

<!-- ======================
PRODUCTOS
====================== -->
<section id="productos">

<h2>Productos</h2>

<div class="productos">

<div class="producto">
<img src="IMG_3041.jpeg">
<h3>Sol Eterno</h3>
<p>1250</p>
<button class="btn-agregar">Agregar</button>
</div>

<div class="producto">
<img src="IMG_3063.jpeg">
<h3>Sueño Rosado</h3>
<p>990</p>
<button class="btn-agregar">Agregar</button>
</div>

</div>

</section>

<!-- ======================
PERSONALIZAR
====================== -->
<section id="personalizar">

<h2>Personaliza tu ramo</h2>

<form id="formPersonalizar">

<select id="flor">
<option>Rosas</option>
<option>Tulipanes</option>
<option>Girasoles</option>
</select>

<select id="color">
<option>Rojo</option>
<option>Rosa</option>
<option>Blanco</option>
</select>

<input id="cantidad" type="number" value="1" min="1">

<select id="papel">
<option>Negro</option>
<option>Blanco</option>
</select>

<select id="moño">
<option>Dorado</option>
<option>Rosa</option>
</select>

<textarea id="mensaje" placeholder="Mensaje opcional"></textarea>

<button type="submit">Enviar por WhatsApp</button>

</form>

</section>

<!-- ======================
CARRITO
====================== -->
<div id="carritoLateral" class="carrito">

<h3>Carrito</h3>

<div class="carrito-items"></div>

<h4 id="total">Total: 0</h4>

<button>Pagar</button>

</div>

<div id="overlay"></div>

<!-- ======================
CHAT IA
====================== -->
<div class="chat">

<button id="abrirChat">🌸</button>

<div id="chatBox" class="chat-box">

<div>
<h3>Lilie AI</h3>
<button id="cerrarChat">X</button>
</div>

<div id="mensajes"></div>

<input id="inputChat">
<button id="enviarChat">Enviar</button>

</div>

</div>

<!-- ======================
SCRIPT
====================== -->
<script src="script.js"></script>

</body>
</html>
